name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Check release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          expected_tag="v$package_version"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "Release tag $RELEASE_TAG does not match package version $package_version." >&2
            echo "Expected tag: $expected_tag" >&2
            exit 1
          fi
      - run: bun run check

  build:
    name: Build ${{ matrix.asset }}
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: kana-darwin-arm64
            target: bun-darwin-arm64
          - asset: kana-darwin-x64
            target: bun-darwin-x64
          - asset: kana-linux-arm64
            target: bun-linux-arm64
          - asset: kana-linux-x64
            target: bun-linux-x64-baseline
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.asset }} src/main.ts
      - run: cd dist && sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: |
          echo "Publishing assets for $RELEASE_TAG to $GH_REPO"
          ls -lh dist/
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release exists, uploading assets..."
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            echo "Creating new release..."
            gh release create "$RELEASE_TAG" dist/* --title "$RELEASE_TAG" --generate-notes
          fi
